<!doctype html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Fracciones Pro</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #fbbf24;
            --primary: #8b5cf6;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: radial-gradient(circle at top, #1e1b4b, #0f172a);
            color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
        }

        /* Animaciones */
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .level-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .level-btn:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.3);
        }

        .fraction-input {
            background: rgba(15, 23, 42, 0.8);
            transition: all 0.2s;
        }

        .fraction-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.2);
        }

        /* Estilo de la fracción */
        .fraction-display {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            margin: 0 5px;
        }
        .fraction-bar {
            width: 100%;
            height: 2px;
            background: #a78bfa;
            margin: 2px 0;
        }

        /* Scrollbar personalizada */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="h-full flex flex-col items-center justify-center p-4">

    <div id="app" class="w-full max-w-2xl h-full flex flex-col justify-center">
        
        <div id="screen-welcome" class="fade-in text-center space-y-8">
            <div class="space-y-2">
                <div class="text-7xl mb-4">🚀</div>
                <h1 class="text-4xl md:text-5xl font-bold text-yellow-400" style="font-family: 'Fredoka', sans-serif;">
                    Misión Fracciones
                </h1>
                <p class="text-indigo-200 text-lg">Domina los números y conquista la galaxia</p>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <button onclick="startLevelSolo(1)" class="level-btn glass rounded-3xl p-6 text-left group">
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-3xl">🧀</span>
                        <i data-lucide="chevron-right" class="text-indigo-400 group-hover:translate-x-1 transition-transform"></i>
                    </div>
                    <h3 class="font-bold text-white text-lg">Modo Quesito</h3>
                    <p class="text-indigo-300 text-sm">Visualiza conceptos básicos</p>
                </button>

                <button onclick="startLevelSolo(2)" class="level-btn glass rounded-3xl p-6 text-left group">
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-3xl">➕</span>
                        <i data-lucide="chevron-right" class="text-indigo-400"></i>
                    </div>
                    <h3 class="font-bold text-white text-lg">Modo Básico</h3>
                    <p class="text-indigo-300 text-sm">Mismo denominador</p>
                </button>
                
                </div>

            <button onclick="showScreen('screen-manual')" class="w-full py-4 rounded-2xl bg-indigo-600 hover:bg-indigo-500 font-bold transition-colors flex items-center justify-center gap-2">
                <i data-lucide="book-open" class="w-5 h-5"></i>
                Manual de Instrucciones
            </button>
        </div>

        <div id="screen-game" class="hidden fade-in flex flex-col gap-6">
            <div class="flex justify-between items-center bg-slate-800/50 p-4 rounded-2xl border border-white/5">
                <button onclick="goHome()" class="p-2 hover:bg-white/10 rounded-lg transition-colors">
                    <i data-lucide="arrow-left" class="w-6 h-6 text-indigo-300"></i>
                </button>
                <div class="flex flex-col items-center">
                    <span id="level-badge" class="text-[10px] uppercase tracking-widest text-yellow-500 font-black">NIVEL 1</span>
                    <div class="flex gap-1">
                        <div id="score-display" class="text-xl font-bold">0</div>
                        <span class="opacity-30">/</span>
                        <div id="round-display" class="text-xl font-bold opacity-60">5</div>
                    </div>
                </div>
                <div class="w-10"></div> </div>

            <div class="glass rounded-3xl p-8 text-center flex flex-col gap-8 min-h-[300px] justify-center">
                <div id="question-text" class="text-2xl font-bold text-indigo-100">Cargando desafío...</div>
                
                <div id="emoji-visual" class="text-6xl py-4"></div>

                <div id="answer-area" class="flex flex-col items-center gap-6">
                    <div class="flex items-center gap-4">
                        <input id="ans-num" type="number" placeholder="Num" class="fraction-input w-24 h-16 text-center text-2xl font-bold rounded-2xl border-2 border-slate-700 outline-none text-yellow-400">
                        <div class="h-12 w-1 bg-slate-700 rounded-full"></div>
                        <input id="ans-den" type="number" placeholder="Den" class="fraction-input w-24 h-16 text-center text-2xl font-bold rounded-2xl border-2 border-slate-700 outline-none text-yellow-400">
                    </div>
                    <button onclick="checkAnswer()" class="w-full sm:w-64 py-4 bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-black rounded-2xl shadow-lg shadow-yellow-500/20 transition-all active:scale-95">
                        COMPROBAR ✨
                    </button>
                </div>

                <div id="feedback" class="hidden p-4 rounded-xl font-bold"></div>
            </div>

            <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden border border-white/5">
                <div id="progress-bar" class="bg-gradient-to-r from-indigo-500 to-yellow-500 h-full transition-all duration-500" style="width: 20%"></div>
            </div>
        </div>

    </div>

    <script>
        // Inicializar iconos
        lucide.createIcons();

        // Funciones de navegación básica para probar el UI
        function showScreen(id) {
            document.getElementById('screen-welcome').classList.add('hidden');
            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        function startLevelSolo(level) {
            showScreen('screen-game');
            // Aquí iría el resto de tu lógica de JS original
        }

        function goHome() {
            showScreen('screen-welcome');
        }
    </script>
</body>
</html>
